name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - run: bun install --frozen-lockfile

      - name: Sherif
        run: bun sherif

      - name: Lint
        run: bun lint

      - name: Format check
        run: bun fmt:check

      - name: Type check
        run: bun check-types

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

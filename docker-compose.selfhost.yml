# Fubbik Self-Hosting
#
# Usage:
#   docker compose -f docker-compose.selfhost.yml up -d
#   Open http://localhost:3001
#
# First run with sample data:
#   SEED_DATABASE=true docker compose -f docker-compose.selfhost.yml up -d

services:
  db:
    image: pgvector/pgvector:0.8.0-pg16
    environment:
      POSTGRES_DB: fubbik
      POSTGRES_USER: fubbik
      POSTGRES_PASSWORD: fubbik
    volumes:
      - fubbik_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fubbik"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    image: pontusg45/fubbik-server:latest
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://fubbik:fubbik@db:5432/fubbik
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-this-to-a-random-string-32ch}
      BETTER_AUTH_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3001
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      PORT: "3000"
      SEED_DATABASE: ${SEED_DATABASE:-false}
    depends_on:
      db:
        condition: service_healthy

  web:
    image: pontusg45/fubbik-web:latest
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
    depends_on:
      - server

volumes:
  fubbik_data:
